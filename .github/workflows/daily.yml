name: Daily KNMT vacancy check

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 07:00 Europe/Amsterdam (summer)
  workflow_dispatch: {}    # allow manual "Run workflow"

permissions:
  contents: write          # to commit updated state.json + docs/data.json

concurrency:
  group: knmt-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watcher.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json docs/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update vacancies $(date -u +%Y-%m-%d)"
            git push
          fi
