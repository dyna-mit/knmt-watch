# KNMT Vacancy Watcher configuration.
#
# Job type is always "Tandarts" (hardcoded in the scraper, not overridable here).
# Everything below narrows the results further. Leave a list empty to NOT filter on it.
# The canonical facet values are listed as comments so you can copy/paste them.

filters:
  # Provinces / regions. Empty = all of the Netherlands.
  # Options: Buitenland, Drenthe, Flevoland, Friesland, Gelderland, Groningen,
  #          Limburg, Noord-Brabant, Noord-Holland, Overijssel, Utrecht, Zeeland, Zuid-Holland
  work_area: [Zuid-Holland]

  # Contract hours type. Options: Fulltime, Parttime, "In overleg"
  contract: []

  # Type of cooperation / employment. Options: zzp, vast, tijdelijk, stage, bbl, overleg, overig
  type_samenwerking: []

  # Practice type.
  # Options: Instelling, "Praktijk met één tandarts", "Praktijk met meer tandartsen"
  praktijk_type: []

  # Client-side numeric filter: drop vacancies whose max hours/week is below this. null = off.
  hours_min: null

# Client-side title keyword rules (applied after scraping).
keyword_include: []   # if set, title must contain at least one of these (case-insensitive)
keyword_exclude: []   # title containing any of these is dropped

# Safety / politeness. Runtime doesn't matter (Actions minutes are free on public repos),
# so we keep the request RATE low to stay gentle on KNMT. This delay is applied between
# both listing-page fetches and detail-page fetches. Raise it to go even slower.
max_pages: 100          # hard cap on listing pages to walk
request_delay_sec: 5    # seconds to pause between every KNMT request
max_new_details: null   # cap detail fetches per run (null = no cap). Useful to throttle first run.

# Where the dashboard lives, so notifications can link to it.
# Set after enabling GitHub Pages, e.g. https://<user>.github.io/<repo>/
dashboard_url: "https://dyna-mit.github.io/knmt-watch/"
