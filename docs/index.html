<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b7285" />
<title>KNMT Tandarts-vacatures</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="bar">
    <h1>KNMT Tandarts-vacatures</h1>
    <span id="meta" class="meta"></span>
  </div>
  <input id="search" type="search" placeholder="Zoek op titel, praktijk, plaats, tekst…" autocomplete="off" />
  <details id="filters-panel">
  <summary id="filters-summary">⚙ Filters &amp; sortering</summary>
  <div class="filters">
    <select id="f-area"><option value="">Alle regio's</option></select>
    <select id="f-emp"><option value="">Alle dienstverbanden</option></select>
    <label class="hours">Min. uren
      <input id="f-hours" type="number" min="0" max="40" step="2" placeholder="0" />
    </label>
    <select id="sort">
      <option value="date">Nieuwste eerst</option>
      <option value="start">Startdatum (eerst beschikbaar)</option>
      <option value="distance">Dichtstbij eerst</option>
      <option value="rating">Beste beoordeling</option>
      <option value="title">Titel A→Z</option>
    </select>
    <label class="hours">Geplaatst vanaf
      <select id="f-since"><option value="">alle datums</option></select>
    </label>
    <label class="negot"><input type="checkbox" id="f-reviews" /> alleen met reviews</label>
    <label class="negot"><input type="checkbox" id="f-direct" /> per direct</label>
    <label class="negot"><input type="checkbox" id="f-hours-ext" /> avond/weekend open</label>
    <label class="negot"><input type="checkbox" id="f-group" checked /> groepeer op praktijk</label>
  </div>
  <div class="dayfilter">
    <span class="lbl">Werkdagen:</span>
    <div id="day-toggles" class="day-toggles"></div>
    <label class="negot"><input type="checkbox" id="f-negot" checked /> ook "in overleg"/niet vermeld</label>
  </div>
  <div class="loc">
    <input id="loc-input" type="text" placeholder="Jouw plaats/adres (voor reisafstand)" autocomplete="off" />
    <button id="loc-set">Stel in</button>
    <button id="loc-clear" class="ghost" title="Wissen">✕</button>
    <details class="ors">
      <summary>Reistijd (auto) ⚙</summary>
      <p>Optioneel: plak een gratis <a href="https://openrouteservice.org/dev/#/signup" target="_blank" rel="noopener">OpenRouteService</a> API-sleutel voor echte rijtijd. Zonder sleutel tonen we hemelsbrede afstand.</p>
      <input id="ors-key" type="password" placeholder="OpenRouteService API key" autocomplete="off" />
      <button id="ors-save">Opslaan</button>
    </details>
    <span id="loc-status" class="loc-status"></span>
  </div>
  </details>
</header>

<main id="list" aria-live="polite"></main>
<footer><span id="count"></span></footer>

<template id="card-tpl">
  <article class="card">
    <div class="card-head">
      <h2 class="practice"></h2>
      <span class="dist badge"></span>
    </div>
    <div class="loc-line"></div>
    <div class="vac-title"></div>
    <div class="tags"></div>
    <div class="excerpt"></div>
    <div class="more" hidden>
      <div class="block practice-info"></div>
      <div class="block offer"></div>
      <div class="block req"></div>
      <div class="block desc"></div>
      <div class="contact"></div>
    </div>
    <div class="actions">
      <button class="toggle">Meer ▾</button>
      <a class="open" target="_blank" rel="noopener">Open op KNMT ↗</a>
    </div>
  </article>
</template>

<template id="group-tpl">
  <section class="card group">
    <div class="card-head">
      <h2 class="practice"></h2>
      <span class="dist badge"></span>
    </div>
    <div class="loc-line"></div>
    <div class="tags gtags"></div>
    <div class="block practice-info"></div>
    <div class="gtabs" role="tablist"></div>
    <div class="gtabcontent"></div>
  </section>
</template>

<template id="vacrow-tpl">
  <div class="vacrow">
    <div class="vacrow-head">
      <span class="vac-title"></span>
      <a class="open" target="_blank" rel="noopener">↗</a>
    </div>
    <div class="tags"></div>
    <div class="excerpt"></div>
    <div class="more" hidden>
      <div class="block offer"></div>
      <div class="block req"></div>
      <div class="block desc"></div>
      <div class="contact"></div>
    </div>
    <button class="toggle">Details ▾</button>
  </div>
</template>

<script>
  // Cache-busting loader: fetch the dataset first (never cached), then load app.js
  // keyed to its version so the UI can't get stuck on a stale cached script —
  // important for home-screen installs that cache aggressively.
  fetch("data.json", { cache: "no-store" })
    .then((r) => r.json())
    .then((d) => { window.__KNMT_DATA__ = d; loadApp(encodeURIComponent(d.generated_at || Date.now())); })
    .catch(() => loadApp(Date.now()));
  function loadApp(v) {
    var s = document.createElement("script");
    s.src = "app.js?v=" + v;
    document.body.appendChild(s);
  }
</script>
</body>
</html>
